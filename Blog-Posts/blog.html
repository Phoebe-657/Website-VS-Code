<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

.blog-custom-header {
  background-color: #1F345C;
  color: white;
  padding: 6px 60px;
  margin: 0 calc(-50vw + 50%);
}

.blog-custom-header .header-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.blog-custom-header .header-left {
  display: flex;
  align-items: center;
}

.blog-custom-header .logo {
  height: 80px;
  width: auto;
  margin-right: 10px;
}

.blog-custom-header .header-nav ul {
  list-style: none;
  display: flex;
  gap: 0;
  margin: 0;
  padding: 0;
}

.blog-custom-header .header-nav li {
  display: flex;
  align-items: center;
}

.blog-custom-header .header-nav li:not(:last-child)::after {
  content: "|";
  color: rgba(255,255,255,0.4);
  margin: 0 40px;
}

.blog-custom-header .header-nav a {
  font-size: 16px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  font-family: 'Special Elite', cursive;
}

.blog-custom-header .header-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.blog-custom-header .header-right a {
  color: white;
  font-size: 18px;
  text-decoration: none;
}

.blog-custom-header .header-nav a:hover,
.blog-custom-header .header-right a:hover {
  color: #ffcc00;
}

.blog-custom-header .social-icon {
  height: 24px;
  width: 24px;
  vertical-align: middle;
  transition: transform 0.2s ease, filter 0.2s ease;
}

.blog-custom-header .header-right a:hover .social-icon {
  transform: scale(1.25);
  filter: brightness(1.3);
}

@media (max-width: 700px) {
  .blog-custom-header {
    padding: 6px 16px;
  }
  .blog-custom-header .header-container {
    flex-wrap: wrap;
    gap: 8px;
  }
  .blog-custom-header .header-nav ul {
    flex-wrap: wrap;
    gap: 8px;
  }
  .blog-custom-header .header-nav li:not(:last-child)::after {
    margin: 0 12px;
  }
}
</style>

<header class="blog-custom-header">
  <div class="header-container">
    <div class="header-left">
      <a href="/">
        <img src="https://ninetysix-studios.com/wp-content/uploads/2026/05/image_2026-05-29_112335959.png" alt="Company Logo" class="logo">
      </a>
    </div>
    <nav class="header-nav">
      <ul>
        <li><a href="https://ninetysix-studios.com/">Home</a></li>
        <li><a href="https://ninetysix-studios.com/blog-posts/">Blogs</a></li>
        <li><a href="#">Free</a></li>
        <li><a href="#">Press</a></li>
        <li><a href="#">About Us</a></li>
      </ul>
    </nav>
    <div class="header-right">
      <a href="https://facebook.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134341040.png" alt="Facebook" class="social-icon"></a>
      <a href="https://instagram.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134442016.png" alt="Instagram" class="social-icon"></a>
      <a href="https://twitter.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134504848.png" alt="Twitter" class="social-icon"></a>
      <a href="https://linkedin.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134654223.png" alt="LinkedIn" class="social-icon"></a>
      <a href="https://tiktok.com/@yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134724016.png" alt="TikTok" class="social-icon"></a>
      <a href="https://youtube.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134819559.png" alt="YouTube" class="social-icon"></a>
    </div>
  </div>
</header>
<!-- ⏹ END HEADER ⏹ -->

<!-- ⏬ CUSTOM HTML — FOOTER ⏬ -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

.blog-custom-footer {
  position: relative;
  text-align: center;
  color: #fff;
  font-size: 0.95rem;
  margin-top: 60px;
  margin-left: calc(-50vw + 50%);
  margin-right: calc(-50vw + 50%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.blog-custom-footer img {
  width: 100%;
  height: auto;
  display: block;
}

.blog-custom-footer p {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}

@media (max-width: 700px) {
  .blog-custom-footer {
    min-height: 0;
  }
  .blog-custom-footer p {
    bottom: 8px;
    font-size: 0.8rem;
  }
}
</style>

<footer class="blog-custom-footer">
  <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/blogpost-footer.png" alt="Footer">
  <p>&copy; <span id="blog-year"></span> NinetySix Studios. All rights reserved</p>
</footer>

<script>
document.getElementById('blog-year').textContent = new Date().getFullYear();
</script>
