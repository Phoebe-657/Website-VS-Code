<!-- BLOCK 1: Custom HTML — CSS + Header (paste first) -->

<!-- ⏬ CUSTOM HTML — STYLES + HEADER ⏬ -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

/* ── Theme Reset ── */
.blog-wrapper,
.blog-wrapper * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

.blog-wrapper {
  font-family: 'Poppins', sans-serif;
  color: #333;
}

/* ── Hide WordPress theme header/footer/wrappers ── */
html:has(.blog-wrapper) header.wp-block-template-part,
html:has(.blog-wrapper) footer:not(.blog-custom-footer),
html:has(.blog-wrapper) #colophon,
html:has(.blog-wrapper) [class*="footer"]:not(.blog-custom-footer) {
  display: none !important;
}
html:has(.blog-wrapper) .wp-site-blocks,
html:has(.blog-wrapper) .entry-content,
html:has(.blog-wrapper) .wp-block-post-content,
html:has(.blog-wrapper) main {
  margin: 0 !important;
  padding: 0 !important;
  max-width: 100% !important;
}
html:has(.blog-wrapper) .has-global-padding {
  padding-top: 0 !important;
}

/* ── Header ── */
.blog-custom-header {
  background-color: #1F345C;
  color: white;
  padding: 6px 60px;
  margin: 0 calc(-50vw + 50%);
}

.blog-custom-header .header-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.blog-custom-header .header-left {
  display: flex;
  align-items: center;
}

.blog-custom-header .logo {
  height: 80px;
  width: auto;
  margin-right: 10px;
}

.blog-custom-header .header-nav ul {
  list-style: none;
  display: flex;
  gap: 0;
  margin: 0;
  padding: 0;
}

.blog-custom-header .header-nav li {
  display: flex;
  align-items: center;
}

.blog-custom-header .header-nav li:not(:last-child)::after {
  content: "|";
  color: rgba(255,255,255,0.4);
  margin: 0 40px;
}

.blog-custom-header .header-nav a {
  font-size: 16px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  font-family: 'Special Elite', cursive;
}

.blog-custom-header .header-right {
  display: flex;
  align-items: center;
  gap: 4px;
}

.blog-custom-header .header-right a {
  color: white;
  font-size: 18px;
  text-decoration: none;
}

.blog-custom-header .header-nav a:hover,
.blog-custom-header .header-right a:hover {
  color: #ffcc00;
}

.blog-custom-header .social-icon {
  height: 24px;
  width: 24px;
  vertical-align: middle;
  transition: transform 0.2s ease, filter 0.2s ease;
}

.blog-custom-header .header-right a:hover .social-icon {
  transform: scale(1.25);
  filter: brightness(1.3);
}

/* ── Query Loop Container ── */
html:has(.blog-wrapper) .wp-block-query {
  max-width: 1800px;
  margin: 0 auto;
  padding: 160px 48px 0;
}

/* ── Query Loop: image left, text right ── */
html:has(.blog-wrapper) .wp-block-post-template .wp-block-columns {
  display: flex !important;
  gap: 50px !important;
  margin-bottom: 60px !important;
  align-items: flex-start !important;
  justify-content: center !important;
}

/* ── Featured image ── */
html:has(.blog-wrapper) .wp-block-post-featured-image {
  flex: 0 0 700px !important;
  max-width: 700px !important;
}
html:has(.blog-wrapper) .wp-block-post-featured-image img {
  border-radius: 12px !important;
  filter: drop-shadow(0 6px 18px rgba(0,0,0,0.22)) drop-shadow(0 2px 5px rgba(0,0,0,0.12)) !important;
  display: block !important;
}

/* ── Content column ── */
html:has(.blog-wrapper) .wp-block-post-template .wp-block-column.is-vertically-aligned-center {
  flex: 1 !important;
  max-width: 550px !important;
}

/* ── Post date ── */
html:has(.blog-wrapper) .wp-block-post-date time {
  font-family: 'Poppins', sans-serif !important;
  font-size: 1.1rem !important;
  color: #777 !important;
}

/* ── Post title link ── */
html:has(.blog-wrapper) .wp-block-post-title a {
  display: inline-block !important;
  background-color: #1f345c !important;
  color: #fff !important;
  font-family: 'Poppins', sans-serif !important;
  font-weight: 700 !important;
  font-size: 1.4rem !important;
  padding: 12px 22px !important;
  border-radius: 14px !important;
  line-height: 1.4 !important;
  text-decoration: underline !important;
  text-underline-offset: 4px !important;
}
html:has(.blog-wrapper) .wp-block-post-title a:hover {
  background-color: #2a4478 !important;
}

/* ── Post excerpt ── */
html:has(.blog-wrapper) .wp-block-post-excerpt__excerpt {
  font-family: 'Poppins', sans-serif !important;
  font-size: 1.1rem !important;
  color: #000 !important;
  line-height: 1.7 !important;
  margin-bottom: 18px !important;
}

/* ── Read more link ── */
html:has(.blog-wrapper) .wp-block-post-excerpt__more-link {
  font-family: 'Poppins', sans-serif !important;
  color: #bf9c3b !important;
  font-weight: 600 !important;
  font-size: 1.1rem !important;
  text-decoration: none !important;
}
html:has(.blog-wrapper) .wp-block-post-excerpt__more-link:hover {
  color: #a5832e !important;
}

/* ── Pagination ── */
html:has(.blog-wrapper) .wp-block-query-pagination {
  justify-content: center !important;
  gap: 20px !important;
  padding-bottom: 20px !important;
  font-family: 'Poppins', sans-serif !important;
}

/* ── Footer ── */
.blog-custom-footer {
  position: relative;
  text-align: center;
  color: #fff;
  font-size: 0.95rem;
  margin-top: 60px;
  margin-left: calc(-50vw + 50%);
  margin-right: calc(-50vw + 50%);
  display: flex;
  align-items: center;
  justify-content: center;
}

.blog-custom-footer img {
  width: 100%;
  height: auto;
  display: block;
}

.blog-custom-footer p {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;
}

/* ── Responsive ── */
@media (max-width: 700px) {
  .blog-custom-header {
    padding: 6px 16px;
  }
  .blog-custom-header .header-container {
    flex-wrap: wrap;
    gap: 8px;
  }
  .blog-custom-header .header-nav ul {
    flex-wrap: wrap;
    gap: 8px;
  }
  .blog-custom-header .header-nav li:not(:last-child)::after {
    margin: 0 12px;
  }

  html:has(.blog-wrapper) .wp-block-post-template .wp-block-columns {
    flex-direction: column !important;
  }
  html:has(.blog-wrapper) .wp-block-post-featured-image {
    flex: 0 0 auto !important;
    max-width: 100% !important;
  }

  .blog-custom-footer p {
    bottom: 8px;
    font-size: 0.8rem;
  }
}
</style>

      <nav class="header-nav">

        <a href="https://twitter.com/yourpage"><img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/image_2026-06-02_134504848.png" alt="Twitter" class="social-icon"></a>

      </div>
    </div>
  </header>

</div>
