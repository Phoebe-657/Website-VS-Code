<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Header Test</title>
  <!-- Link external CSS -->
  <link rel="stylesheet" href="Header.css">
</head>
<body>
  <!-- HEADER BAR -->
  <header class="site-header">
    <div class="header-container">
      <!-- Left: Logo -->
      <div class="header-left">
        <a href="/">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/Logo.png" alt="Company Logo" class="logo">
        </a>
      </div>

      <!-- Center: Navigation -->
      <nav class="header-nav">
        <ul>
          <li><a href="https://ninetysix-studios.com/">Home</a></li>
          <li><a href="https://ninetysix-studios.com/blog-posts/">Blogs</a></li>
          <li><a href="#">Games</a></li>
          <li><a href="https://ninetysix-studios.com/press/">Press</a></li>
          <li><a href="#">About Us</a></li>
        </ul>
      </nav>

      <!-- Right: Social Icons -->
      <div class="header-right">
        <a href="https://facebook.com/yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/Facebook.png" alt="Facebook" class="social-icon">
        </a>
        <a href="https://instagram.com/yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/Instagram.png" alt="Instagram" class="social-icon">
        </a>
        <a href="https://twitter.com/yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/Twitter.png" alt="Twitter" class="social-icon">
        </a>
        <a href="https://linkedin.com/yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/LinkedIn.png" alt="LinkedIn" class="social-icon">
        </a>
        <a href="https://tiktok.com/@yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/Tik-Tok.png" alt="TikTok" class="social-icon">
        </a>
        <a href="https://youtube.com/yourpage">
          <img src="https://ninetysix-studios.com/wp-content/uploads/2026/06/YouTube.png" alt="YouTube" class="social-icon">
        </a>
      </div>
    </div>
  </header>
</body>
</html>
